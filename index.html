<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Genera tu banner personalizado para Twitter con La Sexta. Diseño premium y descarga automática.">
    <title>La Sexta - Twitter Banner Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Fondo animado: Destellos y líneas naranjas -->
    <div class="esports-bg">
        <!-- Destellos (Flares) -->
        <div class="flare flare-1"></div>
        <div class="flare flare-2"></div>
        <div class="flare flare-3"></div>

        <!-- Líneas en movimiento -->
        <div class="moving-line line-1"></div>
        <div class="moving-line line-2"></div>
        <div class="moving-line line-3"></div>
        <div class="moving-line line-4"></div>
        <div class="moving-line line-5"></div>
    </div>

    <div class="app-container">
        <header class="app-header">
            <a href="admin.html" style="text-decoration: none;">
                <h1 class="logo" id="siteTitle">La Sexta</h1>
            </a>
            <p class="subtitle" id="siteSubtitle">Personaliza tu banner de Twitter al instante</p>

            <div class="social-links" id="socialLinksContainer">
                <a href="https://x.com" id="iconX" class="social-icon" target="_blank" aria-label="Twitter / X">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                    </svg>
                </a>
                <a href="https://instagram.com" id="iconIg" class="social-icon" target="_blank" aria-label="Instagram">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z" />
                    </svg>
                </a>
                <a href="#" id="iconWeb" class="social-icon" target="_blank" aria-label="Website">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="2" y1="12" x2="22" y2="12"></line>
                        <path
                            d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z">
                        </path>
                    </svg>
                </a>
            </div>
        </header>

        <main class="main-content">
            <div class="controls-panel glass-panel">
                <div class="input-group">
                    <label for="nameInput" id="inputLabel">Tu Nombre</label>
                    <input type="text" id="nameInput" placeholder="Escribe tu nombre aquí" autocomplete="off"
                        maxlength="20">
                </div>

                <div class="input-group">
                    <label for="bannerColorPicker">Color del Texto</label>
                    <div class="color-picker-wrapper">
                        <input type="color" id="bannerColorPicker" value="#ff5500" class="custom-color-input">
                        <span class="color-hex-display" id="colorHexDisplay">#ff5500</span>
                    </div>
                </div>

                <button id="downloadBtn" class="primary-btn">
                    <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span id="downloadBtnText">Descargar Banner</span>
                </button>
            </div>

            <div class="preview-panel glass-panel">
                <div class="canvas-wrapper">
                    <!-- El tamaño real en JS será 1500x500 -->
                    <canvas id="bannerCanvas"></canvas>
                </div>
                <div class="preview-label" id="previewLabel">Vista Previa (1500x500 px)</div>
            </div>
        </main>
    </div>

    <script src="main.js"></script>
</body>

</html>
